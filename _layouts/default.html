<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="{{ site.description }}">
    <meta name="theme-color" content="#020208">
    <title>{{ site.title | default: site.github.repository_name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
    <canvas id="lidar-canvas" aria-hidden="true"></canvas>
    <div class="scan-overlay" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--1" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--2" aria-hidden="true"></div>
    <div class="bg-glow bg-glow--3" aria-hidden="true"></div>

    <nav class="nav" id="nav">
      <div class="nav__inner">
        <a href="#" class="nav__logo">AL<span class="nav__logo-dot">.</span></a>
        <div class="nav__links" id="nav-links">
          <a href="#about" class="nav__link">About</a>
          <a href="#projects" class="nav__link">Projects</a>
          <a href="#skills" class="nav__link">Skills</a>
          <a href="#experience" class="nav__link">Experience</a>
          <a href="#contact" class="nav__link">Contact</a>
        </div>
        <button class="nav__toggle" id="nav-toggle" aria-label="Toggle menu">
          <span></span><span></span><span></span>
        </button>
      </div>
    </nav>

    <main class="page-wrapper">
      <div class="content-container">
        {{ content }}
      </div>
    </main>

    <script>
    (function() {
      var nav = document.getElementById('nav');
      var toggle = document.getElementById('nav-toggle');
      var links = document.getElementById('nav-links');

      window.addEventListener('scroll', function() {
        nav.classList.toggle('nav--scrolled', window.scrollY > 40);
      });

      toggle.addEventListener('click', function() {
        links.classList.toggle('nav__links--open');
        toggle.classList.toggle('nav__toggle--active');
      });

      links.querySelectorAll('.nav__link').forEach(function(link) {
        link.addEventListener('click', function() {
          links.classList.remove('nav__links--open');
          toggle.classList.remove('nav__toggle--active');
        });
      });

      var sections = document.querySelectorAll('[id]');
      var navLinks = document.querySelectorAll('.nav__link');
      var activeObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            navLinks.forEach(function(l) { l.classList.remove('nav__link--active'); });
            var active = document.querySelector('.nav__link[href="#' + entry.target.id + '"]');
            if (active) active.classList.add('nav__link--active');
          }
        });
      }, { rootMargin: '-20% 0px -75% 0px' });
      sections.forEach(function(s) { activeObserver.observe(s); });

      var reveals = document.querySelectorAll('.reveal');
      var revealObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
          if (entry.isIntersecting) {
            entry.target.classList.add('revealed');
            revealObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08 });
      reveals.forEach(function(el) { revealObserver.observe(el); });
    })();
    </script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" crossorigin="anonymous"></script>
    <script>
    (function() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      var canvas = document.getElementById('lidar-canvas');
      if (!canvas || typeof THREE === 'undefined') return;

      var renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: false });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));

      var scene = new THREE.Scene();
      var camera = new THREE.PerspectiveCamera(50, 1, 0.1, 200);
      camera.position.set(3, 12, 20);
      camera.lookAt(0, -1, 0);

      function terrainY(x, z) {
        return Math.sin(x * 0.26) * Math.cos(z * 0.31) * 2.1
             + Math.sin(x * 0.58 + z * 0.43) * 0.82
             + Math.cos(x * 0.14 + z * 0.19) * 0.58;
      }

      function hcol(y) {
        var t = Math.max(0.0, Math.min(1.0, (y + 2.0) / 5.5));
        var t2 = t * t;
        return [
          0.28 + t * 0.58 + t2 * 0.06,  // r: dark rust → orange → ochre
          0.07 + t * 0.52 + t2 * 0.07,  // g: near-zero → warm amber
          0.01 + t * 0.10 + t2 * 0.04   // b: near-zero throughout
        ];
      }

      var isMobile = window.innerWidth < 768;
      var NPTS = isMobile ? 3500 : 6500;
      var pos = new Float32Array(NPTS * 3);
      var col = new Float32Array(NPTS * 3);
      var n = 0;

      function ap(x, y, z, r, g, b) {
        if (n >= NPTS) return;
        var i = n++ * 3;
        pos[i] = x; pos[i+1] = y; pos[i+2] = z;
        col[i] = r; col[i+1] = g; col[i+2] = b;
      }

      // Ground terrain surface
      var gCount = isMobile ? 2200 : 4200;
      for (var i = 0; i < gCount; i++) {
        var a = Math.random() * 6.2832;
        var d = Math.sqrt(Math.random()) * 17;
        var x = Math.cos(a) * d;
        var z = Math.sin(a) * d;
        var y = terrainY(x, z) + (Math.random() - 0.5) * 0.22;
        var c = hcol(y);
        ap(x, y, z, c[0], c[1], c[2]);
      }

      // Vertical obstacles — rocks and boulders
      var obs = [
        [5.5, 2.8], [-4.2, 4.5], [8.8, -3.6], [-7.5, -2.8],
        [3.2, -8.5], [-2.5, 6.8], [0.8, 4.2], [-5.5, -6.8],
        [10.5, 1.5], [-10.8, 3.2], [2.2, -12], [-8.5, 8.8]
      ];
      var oCount = isMobile ? 900 : 1700;
      for (var j = 0; j < oCount; j++) {
        var ob = obs[j % obs.length];
        var r = Math.random() * 0.6;
        var aa = Math.random() * 6.2832;
        var h = Math.random() * 4.8;
        var xp = ob[0] + Math.cos(aa) * r;
        var zp = ob[1] + Math.sin(aa) * r;
        var yp = terrainY(ob[0], ob[1]) + h;
        var c2 = hcol(yp);
        ap(xp, yp, zp, c2[0] * 0.72, c2[1], c2[2]);
      }

      // Sparse distant returns — outer range ring
      var dCount = isMobile ? 400 : 600;
      for (var k = 0; k < dCount; k++) {
        var da = Math.random() * 6.2832;
        var dd = 15.5 + Math.random() * 4.5;
        var dx = Math.cos(da) * dd;
        var dz = Math.sin(da) * dd;
        var dy = terrainY(dx, dz) + Math.random() * 0.7;
        var s = 0.1 + Math.random() * 0.32;
        ap(dx, dy, dz, s * 0.38, s * 0.13, s * 0.02);
      }

      var geom = new THREE.BufferGeometry();
      geom.setAttribute('position', new THREE.BufferAttribute(pos.slice(0, n * 3), 3));
      geom.setAttribute('color',    new THREE.BufferAttribute(col.slice(0, n * 3), 3));

      var mat = new THREE.PointsMaterial({
        size: 0.10,
        vertexColors: true,
        transparent: true,
        opacity: 0.68,
        sizeAttenuation: true
      });

      var cloud = new THREE.Points(geom, mat);
      scene.add(cloud);

      function resize() {
        var w = window.innerWidth, h = window.innerHeight;
        renderer.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }
      resize();
      window.addEventListener('resize', resize);

      var t = 0;
      var paused = false;
      document.addEventListener('visibilitychange', function() { paused = document.hidden; });

      function tick() {
        requestAnimationFrame(tick);
        if (paused) return;
        t += 0.0022;
        cloud.rotation.y = t;
        cloud.position.y = Math.sin(t * 0.38) * 0.45;
        renderer.render(scene, camera);
      }
      tick();
    })();
    </script>
  </body>
</html>
